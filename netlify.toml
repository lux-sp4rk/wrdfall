[build]
  command = "npm run build:all"
  publish = "dist"

[build.environment]
  # LFS removed — Godot binaries are committed directly in landing/public/
  # See: https://github.com/lux-sp4rk/word-loom/issues/171

# Redirect all routes to index.html (SPA routing)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false

# Cache headers for Godot Wasm (immutable, 1 year)
[[headers]]
  for = "/*.wasm"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    Content-Type = "application/wasm"
    Cross-Origin-Resource-Policy = "same-origin"

# Cache headers for Godot PCK (immutable, 1 year)
[[headers]]
  for = "/*.pck"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    Cross-Origin-Resource-Policy = "same-origin"

# Cache headers for dictionaries (30 days)
[[headers]]
  for = "/dictionaries/*.txt"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

# Cache headers for JS/CSS with content hash (1 year, immutable if hash-versioned)
[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# No-cache for the landing page itself (forces re-fetch on every visit)
# This ensures players always get the latest HTML with new asset references
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma = "no-cache"
    Expires = "0"

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Cross-Origin-Opener-Policy = "same-origin"
    Cross-Origin-Embedder-Policy = "require-corp"
