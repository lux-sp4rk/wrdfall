[build]
  command = "npm run build:all"
  publish = "dist"

[build.environment]
  GIT_LFS_ENABLED = "true"
  GIT_LFS_FETCH_INCLUDE = "dist/*"

# Redirect all routes to index.html (SPA routing)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false

# Cache headers for Godot Wasm (immutable, 1 year)
[[headers]]
  for = "/*.wasm"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    Content-Type = "application/wasm"

# Cache headers for Godot PCK (immutable, 1 year)
[[headers]]
  for = "/*.pck"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache headers for dictionaries (30 days)
[[headers]]
  for = "/dictionaries/*.txt"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Cross-Origin-Opener-Policy = "same-origin"
    Cross-Origin-Embedder-Policy = "require-corp"
