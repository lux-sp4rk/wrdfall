# Lefthook configuration
# See: https://lefthook.dev/configuration/

pre-push:
  jobs:
    - name: block-main-push
      run: |
        CURRENT_BRANCH=$(git rev-parse --abbrev-ref HEAD)
        if [ "$CURRENT_BRANCH" = "main" ]; then
          echo "Direct push to main is not allowed. Use a feature branch."
          exit 1
        fi
    - name: run-gut-tests
      root: "godot/"
      run: |
        if command -v godot &> /dev/null; then
          GODOT_BIN="godot"
        elif [ -f "$HOME/bin/godot" ]; then
          GODOT_BIN="$HOME/bin/godot"
        else
          echo "Godot not found. Skipping tests."
          exit 0
        fi
        echo "Running GUT tests..."
        "$GODOT_BIN" --headless -s addons/gut/gut_cmdln.gd -gdir=res://tests -gexit
      fail_text: "Tests failed. Fix them before pushing."

post-commit:
  commands:
    rescue_main_commits:
      run: bash .lefthook/post-commit/rescue_main_commits
