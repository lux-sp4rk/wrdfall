name: Build Godot Web Export

on:
  pull_request:
    branches: [main, tutorial/*, feature/*, feat/*]
    paths:
      - 'godot/**/*.gd'
      - 'godot/**/*.tscn'
      - 'godot/**/*.tres'
      - 'godot/data/**'
      - 'godot/project.godot'
      - 'godot/export_presets.cfg'
      - '.github/workflows/build-godot-web.yml'
  push:
    branches: [main]
    paths:
      - 'godot/**/*.gd'
      - 'godot/**/*.tscn'
      - 'godot/**/*.tres'
      - 'godot/data/**'
      - 'godot/project.godot'
      - 'godot/export_presets.cfg'
      - '.github/workflows/build-godot-web.yml'

jobs:
  build-godot:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Cache Godot Binaries
        id: cache-godot
        uses: actions/cache@v4
        with:
          path: |
            ./godot_bin
            ~/.local/share/godot/export_templates/4.6.stable
          key: ${{ runner.os }}-godot-4.6-stable

      - name: Export to Web
        run: ./scripts/export-godot.sh

      - name: Check if binaries changed
        id: check_changes
        run: |
          if git diff --quiet landing/public/index.{wasm,pck,js}; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Comment on PR (if updated)
        if: github.event_name == 'pull_request' && steps.check_changes.outputs.changed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ Godot web exports rebuilt. Netlify deploy preview will update shortly. (Note: These changes are not committed to the branch)'
            })
