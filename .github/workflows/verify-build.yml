name: Build Verification

on:
  pull_request:
    branches: [ main, perf-and-style-audit ]
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run Build
        run: ./build.sh

      - name: Notify Failure
        if: failure()
        run: |
          curl -X POST -H "Content-Type: application/json" \
          -d '{"text": "🚨 Word Loom Build FAILED for PR #${{ github.event.pull_request.number }}: ${{ github.event.pull_request.html_url }}"}' \
          ${{ secrets.OPENCLAW_WEBHOOK_URL }}
