name: Arachne Code Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    uses: lux-sp4rk/dotfiles/gh-actions/.github/workflows/arachne-review.yml@main
    secrets:
      ARCEE_API_KEY: ${{ secrets.ARCEE_API_KEY }}
    with:
      passes: 'logic,security,performance,judge'
      max-files: 30
