name: Bug Hunter D33

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  bug-hunter-d33:
    name: Bug Hunter D33
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      checks: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Summon the Hunter
        uses: lux-sp4rk/bug-hunter-d33@9f964167e8d62a86e71ab1c1c176c1401fff2427
        continue-on-error: true
        with:
          arcee-api-key: ${{ secrets.ARCEE_API_KEY }}
          model: 'arcee/trinity-mini'
          framework: godot
          passes: 'logic,security,judge,performance'
          severity-threshold: 'note'
          max-files: 50
          custom-prompts-path: '.ai-memory'
