name: Test Runner Faye

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  test-runner:
    name: Test Runner Faye
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      checks: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Summon Faye
        uses: lux-sp4rk/test-runner-faye@53898dd2e53204b90a1a16f7ec6fabb00c35c0c7
        continue-on-error: false
        with:
          arcee-api-key: ${{ secrets.ARCEE_API_KEY }}
          passes: 'test,coverage,delta'
          coverage-threshold: 80
          test-command: 'pnpm vitest run --passWithNoTests'
          coverage-command: 'pnpm vitest run --coverage --passWithNoTests'
          working-directory: 'landing'
          custom-prompts-path: '.ai-memory'
