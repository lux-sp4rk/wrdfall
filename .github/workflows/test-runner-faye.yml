name: Test Runner Faye

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  test-runner:
    name: Test Runner Faye
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      checks: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Summon Faye
        uses: lux-sp4rk/test-runner-faye@d397b2b1940d2983c839566a02a9fdfee83057f2
        continue-on-error: false
        with:
          arcee-api-key: ${{ secrets.ARCEE_API_KEY }}
          passes: 'test,coverage,delta'
          coverage-threshold: 80
          test-command: 'cd landing && pnpm vitest run --passWithNoTests'
          coverage-command: 'cd landing && pnpm vitest run --coverage --passWithNoTests'
          custom-prompts-path: '.ai-memory'
