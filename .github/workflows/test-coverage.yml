name: Test Coverage

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test-godot:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      
      - name: Cache Godot
        uses: actions/cache@v4
        with:
          path: |
            ./godot_bin
            ~/.local/share/godot/export_templates/4.6.stable
          key: ${{ runner.os }}-godot-4.6-stable
      
      - name: Install Godot
        run: |
          if [ ! -d ./godot_bin ]; then
            rm -f ./godot_bin
            mkdir -p ./godot_bin
          fi
          if [ ! -f ./godot_bin/godot ]; then
            wget -q -O ./godot_bin/godot.zip https://downloads.tuxfamily.org/godotengine/4.6/Godot_v4.6-stable_linux.x86_64.zip
            unzip -q ./godot_bin/godot.zip -d ./godot_bin
            chmod +x ./godot_bin/Godot_v4.6-stable_linux.x86_64
            mv ./godot_bin/Godot_v4.6-stable_linux.x86_64 ./godot_bin/godot
          fi
      
      - name: Run GUT tests
        run: |
          cd godot
          ../godot_bin/godot --headless --script addons/gut/gut_cmdln.gd -gdir=res://tests -ginclude_subdirs -gexit
      
      - name: Check GUT test results
        run: |
          # GUT returns exit code based on test results
          echo "GUT tests completed"
